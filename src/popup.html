<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inferfox SmartPace</title>
    <style>
      @font-face {
        font-family: "Inferfox Orbitron";
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url("../assets/fonts/Orbitron-Bold.woff2") format("woff2");
      }
      * { box-sizing: border-box; }
      body { width: 240px; margin: 0; padding: 14px; color: #171717; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
      .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
      .brand-icon { width: 28px; height: 28px; flex: 0 0 28px; }
      h1 { margin: 0; font-family: "Inferfox Orbitron", system-ui, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
      button { width: 100%; padding: 10px; border: 1px solid #222; border-radius: 8px; background: #222; color: #fff; font: inherit; cursor: pointer; }
      button:focus-visible { outline: 3px solid #9bb4ff; outline-offset: 2px; }
      .actions { display: grid; gap: 8px; }
      .status { min-height: 18px; margin: 8px 0 0; color: #555; font-size: 12px; }
      .status:empty { display: none; }
      .status.error { color: #b00020; }
    </style>
  </head>
  <body>
    <div class="brand">
      <img class="brand-icon" src="../assets/icon-48.png" alt="" />
      <h1>Inferfox SmartPace</h1>
    </div>
    <div class="actions">
      <button id="setCurrentSpeed" type="button" hidden>Set current speed</button>
      <button id="openOptions" type="button">Open dashboard</button>
    </div>
    <div id="status" class="status" role="status" aria-live="polite"></div>
    <script src="popup.js"></script>
  </body>
</html>
